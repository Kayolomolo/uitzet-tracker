<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uitzet Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<meta name="theme-color" content="#b8860b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  :root {
    --bg: #faf7f2;
    --card: #ffffff;
    --primary: #b8860b;
    --primary-light: #f5e6c8;
    --text: #2d2d2d;
    --text-light: #777;
    --green: #4caf50;
    --green-light: #e8f5e9;
    --orange: #ff9800;
    --orange-light: #fff3e0;
    --border: #e8e0d4;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .app-header {
    background: linear-gradient(135deg, var(--primary), #d4a017);
    color: white;
    padding: 28px 20px 22px;
    text-align: center;
  }
  .app-header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .app-header p { font-size: 14px; opacity: 0.85; margin-top: 4px; }
  .progress-bar {
    height: 6px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 14px;
  }
  .progress-fill {
    height: 100%;
    background: white;
    border-radius: 3px;
    transition: width 0.5s ease;
  }
  .stats-bar {
    display: flex;
    gap: 10px;
    padding: 16px 20px;
    max-width: 600px;
    margin: 0 auto;
  }
  .stat-card {
    flex: 1;
    min-width: 80px;
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .stat-number { font-size: 28px; font-weight: 700; color: var(--primary); }
  .stat-number.green { color: var(--green); }
  .stat-number.orange { color: var(--orange); }
  .stat-label {
    font-size: 11px;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }
  .tabs {
    display: flex;
    gap: 6px;
    padding: 8px 20px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    max-width: 600px;
    margin: 0 auto;
  }
  .tab {
    padding: 10px 18px;
    border-radius: 30px;
    border: none;
    background: var(--card);
    color: var(--text-light);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    box-shadow: var(--shadow);
  }
  .tab.active { background: var(--primary); color: white; }
  .tab-count {
    display: inline-block;
    background: rgba(0,0,0,0.1);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 12px;
    margin-left: 5px;
  }
  .tab.active .tab-count { background: rgba(255,255,255,0.25); }
  .content {
    padding: 12px 20px 120px;
    max-width: 600px;
    margin: 0 auto;
  }
  .filter-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .filter-btn {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-size: 13px;
    cursor: pointer;
    color: var(--text-light);
    transition: all 0.2s;
  }
  .filter-btn.active {
    border-color: var(--primary);
    color: var(--primary);
    background: var(--primary-light);
  }
  .item-list { display: flex; flex-direction: column; gap: 10px; }
  .item-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .item-check {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 16px;
    color: transparent;
  }
  .item-check.checked {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }
  .item-info { flex: 1; min-width: 0; cursor: pointer; }
  .item-name { font-size: 16px; font-weight: 500; }
  .item-name.bought { text-decoration: line-through; color: var(--text-light); }
  .item-meta { font-size: 12px; color: var(--text-light); margin-top: 3px; }
  .item-badge {
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-bought { background: var(--green-light); color: var(--green); }
  .badge-wishlist { background: var(--orange-light); color: var(--orange); }
  .item-delete {
    background: none;
    border: none;
    color: #ccc;
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
  }
  .item-delete:hover { color: #e74c3c; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-light); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), #d4a017);
    color: white;
    border: none;
    font-size: 32px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(184,134,11,0.4);
    z-index: 100;
  }
  .fab:hover { transform: scale(1.08); }
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 200;
  }
  .modal {
    background: var(--card);
    border-radius: 20px 20px 0 0;
    padding: 28px 24px 36px;
    width: 100%;
    max-width: 500px;
  }
  .modal h2 { font-size: 20px; margin-bottom: 20px; text-align: center; }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-light);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 16px;
    font-family: inherit;
    background: var(--bg);
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: var(--primary);
  }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .form-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-primary { background: linear-gradient(135deg, var(--primary), #d4a017); color: white; }
  .btn-secondary { background: var(--bg); color: var(--text); }
  .hidden { display: none !important; }
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-light);
  }
  .sync-badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    margin-top: 6px;
    background: rgba(255,255,255,0.2);
  }
</style>
</head>
<body>

<header class="app-header">
  <h1>Uitzet Tracker</h1>
  <p id="header-subtitle">0 van 0 items gekocht</p>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="sync-badge" id="sync-status">Verbinden...</div>
</header>

<div class="stats-bar">
  <div class="stat-card">
    <div class="stat-number" id="stat-total">0</div>
    <div class="stat-label">Totaal</div>
  </div>
  <div class="stat-card">
    <div class="stat-number green" id="stat-bought">0</div>
    <div class="stat-label">Gekocht</div>
  </div>
  <div class="stat-card">
    <div class="stat-number orange" id="stat-needed">0</div>
    <div class="stat-label">Nog nodig</div>
  </div>
</div>

<div class="tabs" id="tabs"></div>

<div class="content">
  <div class="filter-row" id="filter-row"></div>
  <div class="item-list" id="item-list">
    <div class="loading">Laden...</div>
  </div>
</div>

<button class="fab" id="fab-add">+</button>

<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">Nieuw item</h2>
    <form id="item-form">
      <div class="form-group">
        <label>Naam</label>
        <input type="text" id="input-name" placeholder="Bijv. Koekenpan, Handdoeken..." required>
      </div>
      <div class="form-group">
        <label>Categorie</label>
        <select id="input-category"></select>
      </div>
      <div class="form-group">
        <label>Prijs (optioneel)</label>
        <input type="text" id="input-price" placeholder="bijv. 29.99">
      </div>
      <div class="form-group">
        <label>Notities (optioneel)</label>
        <textarea id="input-notes" placeholder="Bijv. kleur, maat, winkel..."></textarea>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-secondary" id="btn-cancel">Annuleren</button>
        <button type="submit" class="btn btn-primary" id="btn-save">Toevoegen</button>
      </div>
    </form>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-app.js";
import { getDatabase, ref, onValue, set, push, remove, update } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-database.js";

var firebaseConfig = {
  apiKey: "AIzaSyAw5szZ9RnNrsnDUHlvJple5Sdfkmm0BJQ",
  authDomain: "uitzet-tracker.firebaseapp.com",
  databaseURL: "https://uitzet-tracker-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "uitzet-tracker",
  storageBucket: "uitzet-tracker.firebasestorage.app",
  messagingSenderId: "19933115348",
  appId: "1:19933115348:web:d8626d1cf4644395811c41"
};

var app = initializeApp(firebaseConfig);
var db = getDatabase(app);
var itemsRef = ref(db, 'items');

var CATEGORIES = [
  { id: 'alle', name: 'Alles', icon: '\u{1F3E0}' },
  { id: 'keuken', name: 'Keuken', icon: '\u{1F373}' },
  { id: 'badkamer', name: 'Badkamer', icon: '\u{1F6C1}' },
  { id: 'slaapkamer', name: 'Slaapkamer', icon: '\u{1F6CF}️' },
  { id: 'woonkamer', name: 'Woonkamer', icon: '\u{1F6CB}️' }
];

var items = [];
var activeCategory = 'alle';
var activeFilter = 'alle';
var editingKey = null;

function getCategoryById(id) {
  for (var i = 0; i < CATEGORIES.length; i++) {
    if (CATEGORIES[i].id === id) return CATEGORIES[i];
  }
  return CATEGORIES[0];
}

function getFilteredItems() {
  return items.filter(function(item) {
    if (activeCategory !== 'alle' && item.category !== activeCategory) return false;
    if (activeFilter === 'gekocht' && !item.bought) return false;
    if (activeFilter === 'nodig' && item.bought) return false;
    return true;
  });
}

function getStats() {
  var relevant = activeCategory === 'alle' ? items : items.filter(function(i) { return i.category === activeCategory; });
  var bought = relevant.filter(function(i) { return i.bought; }).length;
  return { total: relevant.length, bought: bought, needed: relevant.length - bought };
}

function renderStats() {
  var stats = getStats();
  document.getElementById('stat-total').textContent = stats.total;
  document.getElementById('stat-bought').textContent = stats.bought;
  document.getElementById('stat-needed').textContent = stats.needed;
  document.getElementById('header-subtitle').textContent = stats.bought + ' van ' + stats.total + ' items gekocht';
  var pct = stats.total > 0 ? Math.round((stats.bought / stats.total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function renderTabs() {
  var container = document.getElementById('tabs');
  container.innerHTML = '';
  CATEGORIES.forEach(function(cat) {
    var count = cat.id === 'alle' ? items.length : items.filter(function(i) { return i.category === cat.id; }).length;
    var btn = document.createElement('button');
    btn.className = 'tab' + (activeCategory === cat.id ? ' active' : '');
    btn.innerHTML = cat.icon + ' ' + cat.name + ' <span class="tab-count">' + count + '</span>';
    btn.addEventListener('click', function() {
      activeCategory = cat.id;
      render();
    });
    container.appendChild(btn);
  });
}

function renderFilters() {
  var container = document.getElementById('filter-row');
  container.innerHTML = '';
  var filters = [
    { id: 'alle', label: 'Alles' },
    { id: 'gekocht', label: 'Gekocht' },
    { id: 'nodig', label: 'Nog nodig' }
  ];
  filters.forEach(function(f) {
    var btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeFilter === f.id ? ' active' : '');
    btn.textContent = f.label;
    btn.addEventListener('click', function() {
      activeFilter = f.id;
      render();
    });
    container.appendChild(btn);
  });
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderItems() {
  var container = document.getElementById('item-list');
  container.innerHTML = '';
  var filtered = getFilteredItems();

  if (filtered.length === 0) {
    var catInfo = getCategoryById(activeCategory);
    container.innerHTML =
      '<div class="empty-state">' +
        '<div class="empty-icon">' + (activeCategory === 'alle' ? '\u{1F4E6}' : catInfo.icon) + '</div>' +
        '<p>Nog geen items' + (activeCategory !== 'alle' ? ' in ' + catInfo.name.toLowerCase() : '') + '.</p>' +
        '<p style="margin-top:8px">Tik op + om iets toe te voegen!</p>' +
      '</div>';
    return;
  }

  filtered.forEach(function(item) {
    var cat = getCategoryById(item.category);
    var card = document.createElement('div');
    card.className = 'item-card';

    var check = document.createElement('div');
    check.className = 'item-check' + (item.bought ? ' checked' : '');
    check.textContent = item.bought ? '✓' : '';
    check.addEventListener('click', function() {
      update(ref(db, 'items/' + item.key), { bought: !item.bought });
    });

    var info = document.createElement('div');
    info.className = 'item-info';
    info.innerHTML =
      '<div class="item-name' + (item.bought ? ' bought' : '') + '">' + escapeHtml(item.name) + '</div>' +
      (item.notes ? '<div class="item-meta">' + escapeHtml(item.notes) + '</div>' : '') +
      '<div class="item-meta">' + cat.icon + ' ' + cat.name + (item.price ? ' · €' + escapeHtml(item.price) : '') + '</div>';
    info.addEventListener('click', function() { openEditModal(item); });

    var badge = document.createElement('span');
    badge.className = 'item-badge ' + (item.bought ? 'badge-bought' : 'badge-wishlist');
    badge.textContent = item.bought ? 'Gekocht' : 'Nog nodig';

    var del = document.createElement('button');
    del.className = 'item-delete';
    del.innerHTML = '&times;';
    del.addEventListener('click', function() {
      remove(ref(db, 'items/' + item.key));
    });

    card.appendChild(check);
    card.appendChild(info);
    card.appendChild(badge);
    card.appendChild(del);
    container.appendChild(card);
  });
}

function render() {
  renderStats();
  renderTabs();
  renderFilters();
  renderItems();
}

function openAddModal() {
  editingKey = null;
  document.getElementById('modal-title').textContent = 'Nieuw item';
  document.getElementById('btn-save').textContent = 'Toevoegen';
  document.getElementById('input-name').value = '';
  document.getElementById('input-category').value = activeCategory !== 'alle' ? activeCategory : 'keuken';
  document.getElementById('input-price').value = '';
  document.getElementById('input-notes').value = '';
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.getElementById('input-name').focus();
}

function openEditModal(item) {
  editingKey = item.key;
  document.getElementById('modal-title').textContent = 'Item bewerken';
  document.getElementById('btn-save').textContent = 'Opslaan';
  document.getElementById('input-name').value = item.name;
  document.getElementById('input-category').value = item.category;
  document.getElementById('input-price').value = item.price || '';
  document.getElementById('input-notes').value = item.notes || '';
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.getElementById('input-name').focus();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  editingKey = null;
}

// Build category select
(function() {
  var select = document.getElementById('input-category');
  CATEGORIES.forEach(function(cat) {
    if (cat.id === 'alle') return;
    var opt = document.createElement('option');
    opt.value = cat.id;
    opt.textContent = cat.icon + ' ' + cat.name;
    select.appendChild(opt);
  });
})();

// Event listeners
document.getElementById('fab-add').addEventListener('click', openAddModal);
document.getElementById('btn-cancel').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.getElementById('item-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var name = document.getElementById('input-name').value.trim();
  if (!name) return;

  var data = {
    name: name,
    category: document.getElementById('input-category').value,
    price: document.getElementById('input-price').value.trim(),
    notes: document.getElementById('input-notes').value.trim(),
    bought: false
  };

  if (editingKey !== null) {
    var existing = items.find(function(i) { return i.key === editingKey; });
    if (existing) data.bought = existing.bought;
    update(ref(db, 'items/' + editingKey), data);
  } else {
    push(itemsRef, data);
  }

  closeModal();
});

// Real-time listener
onValue(itemsRef, function(snapshot) {
  items = [];
  var val = snapshot.val();
  if (val) {
    Object.keys(val).forEach(function(key) {
      var item = val[key];
      item.key = key;
      items.push(item);
    });
  }
  document.getElementById('sync-status').textContent = '✓ Live gesynchroniseerd';
  render();
}, function(error) {
  document.getElementById('sync-status').textContent = '⚠ Offline modus';
  render();
});
</script>
</body>
</html>
